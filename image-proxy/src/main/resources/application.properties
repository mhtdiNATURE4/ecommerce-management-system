server.port=9090

# HMAC secret must be provided via env in production
image.proxy.hmac.secret=${IMAGE_PROXY_HMAC_SECRET:}
image.proxy.connect-timeout-ms=3000
image.proxy.read-timeout-ms=5000
image.proxy.max-bytes=2000000
image.proxy.max-width=800
image.proxy.max-height=800

management.endpoints.web.exposure.include=health,info
