spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
# jwt.cookie.secure removed — cookie auth not used
spring.mail.host=
spring.mail.port=587

# Dev-friendly JWT secret fallback (only used in dev/local).
# WARNING: This secret is insecure and must not be used in staging/production.
jwt.secret=dev-change-me-with-32+chars-at-least-123456

# Ensure SpringDoc paths are available in dev
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
