spring.application.name=ecommerce

# =========================
# DATABASE
# =========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT
# =========================
# REQUIRED (no default for security)
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================
# SWAGGER
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# MAIL
# =========================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
spring.mail.from=${MAIL_FROM:no-reply@example.com}

# =========================
# SERVER
# =========================
server.port=8080

# =========================
# JSON
# =========================
spring.jackson.default-property-inclusion=non_null

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Allow Flyway to baseline an existing schema when running locally
spring.flyway.baseline-on-migrate=true
# In local dev allow starting even if prior migration failed
spring.flyway.ignore-failed-migrations=true

# Outbox processor tuning
outbox.processor.batch-size=50
outbox.processor.reclaim-ttl-seconds=60
outbox.processor.max-retries=5
outbox.processor.retry-backoff-seconds=60
outbox.processor.base-backoff-seconds=60
outbox.processor.max-backoff-seconds=3600
outbox.processor.jitter-seconds=30

# Notification executor configuration
notification.enabled=true
notification.executor.queue-capacity=100
notification.executor.thread-name-prefix=notification-service-worker

# Feature toggles
# Disable legacy Spring payment listener by default; enable only for testing if needed
feature.payment.legacy-listener.enabled=false