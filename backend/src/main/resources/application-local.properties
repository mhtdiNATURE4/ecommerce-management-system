# Local profile properties (alias for dev-like local runs)
# Dev-friendly JWT secret fallback (only used in dev/local).
# WARNING: This secret is insecure and must not be used in staging/production.
jwt.secret=local-change-me-with-32+chars-at-least-123456

# Ensure SpringDoc paths are available in local
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
